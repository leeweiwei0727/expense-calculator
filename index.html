<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
<title>月／年支出計算器｜雲端版</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
<header class="topbar">
<div><h1>月／年支出計算器</h1><p class="subtitle" id="syncSubtitle">尚未登入；目前使用本機儲存。</p></div>
<div class="toolbar">
<div class="authbox"><span class="authdot" id="authDot"></span><span class="authtext" id="authText">未登入</span></div>
<button class="btn primary" id="loginBtn">Google 登入</button>
<button class="btn hidden" id="logoutBtn">登出</button>
<button class="btn" id="exportBtn">下載備份</button><button class="btn" id="importBtn">匯入備份</button><button class="btn danger ghost" id="resetBtn">重設</button>
<input class="hidden" id="importFile" type="file" accept="application/json">
</div></header>
<section class="grid stats">
<div class="card stat"><div class="label">平均每月支出</div><div class="value" id="monthlyTotal">NT$0</div><div class="mini">所有週期換算後</div></div>
<div class="card stat"><div class="label">預估每年支出</div><div class="value" id="annualTotal">NT$0</div><div class="mini">以 12 個月計算</div></div>
<div class="card stat"><div class="label">支出項目</div><div class="value" id="itemCount">0</div><div class="mini">目前已建立的項目</div></div>
<div class="card stat"><div class="label">最大支出分類</div><div class="value" id="largestCategory">—</div><div class="mini" id="largestCategoryMini">尚無資料</div></div>
</section>
<main class="grid main-grid">
<section class="card section"><div class="section-title"><h2 id="formTitle">新增支出</h2></div>
<form id="expenseForm"><div class="form-grid">
<div class="field full"><label for="name">支出名稱</label><input id="name" maxlength="80" required placeholder="例如：車貸、房租、保險"></div>
<div class="field"><label for="amount">金額</label><input id="amount" type="number" min="0" step="1" required placeholder="0"></div>
<div class="field"><label for="frequency">付款週期</label><select id="frequency"><option value="monthly">每月</option><option value="annual">每年</option><option value="quarterly">每季</option><option value="weekly">每週</option></select></div>
<div class="field full"><label for="category">分類</label><div class="inline"><select id="category" required></select><button class="btn" type="button" id="addCategoryBtn">＋分類</button></div></div>
<div class="field full"><label for="note">備註（選填）</label><input id="note" maxlength="120" placeholder="例如：每年 6 月扣款"></div>
</div><div class="form-actions"><button class="btn primary" type="submit" id="submitBtn">新增支出</button><button class="btn hidden" type="button" id="cancelEditBtn">取消編輯</button></div>
<div class="helper">登入 Google 後，資料會自動同步到手機與電腦；未登入時仍可使用本機模式。</div></form></section>
<section class="card section"><div class="section-title"><h2>分類占比</h2><select id="chartBasis" style="width:auto"><option value="monthly">依月支出</option><option value="annual">依年支出</option></select></div>
<div class="chart-wrap"><div class="canvas-box"><canvas id="donutChart" width="600" height="600"></canvas><div class="chart-center"><strong id="chartTotal">NT$0</strong><span id="chartTotalLabel">每月總支出</span></div></div><div class="legend" id="legend"></div></div>
<div class="footnote">占比依各分類換算後的總支出計算。</div></section></main>
<section class="card table-card"><div class="table-head"><h2>支出明細</h2><div class="filters"><input id="searchInput" placeholder="搜尋支出名稱"><select id="categoryFilter"><option value="">所有分類</option></select><select id="sortSelect"><option value="monthly-desc">月支出：高到低</option><option value="monthly-asc">月支出：低到高</option><option value="name-asc">名稱：A 到 Z</option><option value="category-asc">分類：A 到 Z</option></select></div></div>
<div class="table-scroll"><table><thead><tr><th>支出名稱</th><th>分類</th><th>付款週期</th><th style="text-align:right">原始金額</th><th style="text-align:right">平均每月</th><th style="text-align:right">每年</th><th style="text-align:right">操作</th></tr></thead><tbody id="expenseRows"></tbody></table><div class="empty hidden" id="emptyState">尚未建立任何支出項目。</div></div></section>
</div><div class="toast" id="toast"></div>


<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body></html>
