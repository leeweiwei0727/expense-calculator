<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>月／年支出計算器</title>
  <style>
    :root{
      --bg:#090b0e;
      --panel:#14171c;
      --panel-2:#1b1f25;
      --line:#2b3038;
      --text:#f4f6f8;
      --muted:#9aa3ad;
      --accent:#4b9cff;
      --accent-2:#2678df;
      --danger:#ff6262;
      --ok:#44c78a;
      --shadow:0 12px 40px rgba(0,0,0,.32);
      color-scheme:dark;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      background:
        radial-gradient(circle at 15% -10%, rgba(75,156,255,.16), transparent 30rem),
        var(--bg);
      color:var(--text);
    }
    button,input,select{font:inherit}
    button{cursor:pointer}
    .app{width:min(1180px,100%);margin:auto;padding:20px 16px 60px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:16px;
      padding:8px 0 18px;
    }
    h1{font-size:clamp(24px,4vw,38px);margin:0;letter-spacing:-.03em}
    .subtitle{color:var(--muted);margin:6px 0 0;font-size:14px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      border:1px solid var(--line);background:var(--panel-2);color:var(--text);
      border-radius:12px;padding:10px 14px;font-weight:700;
    }
    .btn:hover{border-color:#4a5360;transform:translateY(-1px)}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#071322}
    .btn.primary:hover{background:#68adff}
    .btn.danger{color:#ffb1b1}
    .btn.ghost{background:transparent}
    .grid{display:grid;gap:14px}
    .stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:14px}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.018),transparent),var(--panel);
      border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
    }
    .stat{padding:18px}
    .stat .label{font-size:13px;color:var(--muted);margin-bottom:8px}
    .stat .value{font-size:clamp(22px,3vw,32px);font-weight:850;letter-spacing:-.03em}
    .stat .mini{font-size:12px;color:var(--muted);margin-top:5px}
    .main-grid{grid-template-columns:420px 1fr;align-items:start}
    .section{padding:18px}
    .section-title{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      margin-bottom:14px
    }
    .section-title h2{margin:0;font-size:18px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field{display:grid;gap:7px}
    .field.full{grid-column:1/-1}
    label{font-size:13px;color:#c7cdd4;font-weight:700}
    input,select{
      width:100%;border:1px solid var(--line);background:#0f1216;color:var(--text);
      border-radius:12px;padding:12px 13px;outline:none;
    }
    input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(75,156,255,.14)}
    .inline{display:flex;gap:8px}
    .inline>*:first-child{flex:1}
    .form-actions{display:flex;gap:8px;margin-top:14px}
    .form-actions .btn{flex:1}
    .helper{font-size:12px;color:var(--muted);line-height:1.55;margin-top:10px}
    .chart-wrap{display:grid;grid-template-columns:minmax(250px,340px) 1fr;gap:16px;align-items:center}
    .canvas-box{position:relative;aspect-ratio:1/1;max-width:330px;margin:auto;width:100%}
    canvas{width:100%;height:100%;display:block}
    .chart-center{
      position:absolute;inset:0;display:grid;place-content:center;text-align:center;pointer-events:none
    }
    .chart-center strong{font-size:24px}
    .chart-center span{font-size:12px;color:var(--muted);margin-top:3px}
    .legend{display:grid;gap:8px;max-height:355px;overflow:auto;padding-right:4px}
    .legend-row{
      display:grid;grid-template-columns:12px minmax(0,1fr) auto;gap:9px;align-items:center;
      padding:9px 10px;border:1px solid var(--line);border-radius:11px;background:#101318
    }
    .dot{width:12px;height:12px;border-radius:4px}
    .legend-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .legend-value{text-align:right;font-variant-numeric:tabular-nums}
    .legend-value b{display:block}
    .legend-value small{color:var(--muted)}
    .table-card{margin-top:14px;overflow:hidden}
    .table-head{
      padding:16px 18px;display:flex;gap:12px;justify-content:space-between;align-items:center;
      border-bottom:1px solid var(--line)
    }
    .table-head h2{margin:0;font-size:18px}
    .filters{display:flex;gap:8px;flex-wrap:wrap}
    .filters input,.filters select{width:auto;min-width:150px;padding:9px 11px}
    .table-scroll{overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:850px}
    th,td{padding:13px 16px;text-align:left;border-bottom:1px solid var(--line)}
    th{font-size:12px;color:var(--muted);font-weight:750;background:#101318;position:sticky;top:0}
    td{font-size:14px}
    td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
    .badge{
      display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;
      padding:5px 9px;font-size:12px;background:#101318
    }
    .actions{display:flex;gap:6px;justify-content:flex-end}
    .icon-btn{
      border:1px solid var(--line);background:#101318;color:var(--text);
      border-radius:9px;padding:7px 9px
    }
    .icon-btn.delete{color:#ff9d9d}
    .empty{padding:36px 18px;text-align:center;color:var(--muted)}
    .footnote{color:var(--muted);font-size:12px;line-height:1.6;margin-top:12px}
    .toast{
      position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);
      background:#f2f5f8;color:#101318;padding:11px 16px;border-radius:12px;
      font-weight:750;opacity:0;pointer-events:none;transition:.22s;z-index:20
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}
    .hidden{display:none!important}
    @media(max-width:900px){
      .stats{grid-template-columns:1fr 1fr}
      .main-grid{grid-template-columns:1fr}
      .chart-wrap{grid-template-columns:1fr 1fr}
    }
    @media(max-width:620px){
      .app{padding:14px 10px 40px}
      .topbar{align-items:flex-start;flex-direction:column}
      .toolbar{justify-content:flex-start}
      .stats{grid-template-columns:1fr 1fr}
      .stat{padding:14px}
      .main-grid{display:block}
      .main-grid>.card{margin-bottom:12px}
      .chart-wrap{grid-template-columns:1fr}
      .legend{max-height:none}
      .form-grid{grid-template-columns:1fr}
      .field.full{grid-column:auto}
      .table-head{align-items:stretch;flex-direction:column}
      .filters{display:grid;grid-template-columns:1fr 1fr}
      .filters input{grid-column:1/-1;width:100%}
      .filters select{width:100%;min-width:0}
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <h1>月／年支出計算器</h1>
      <p class="subtitle">資料只會儲存在這台裝置的瀏覽器，不會上傳。</p>
    </div>
    <div class="toolbar">
      <button class="btn" id="exportBtn">下載備份</button>
      <button class="btn" id="importBtn">匯入備份</button>
      <button class="btn danger ghost" id="resetBtn">重設</button>
      <input class="hidden" id="importFile" type="file" accept="application/json" />
    </div>
  </header>

  <section class="grid stats">
    <div class="card stat">
      <div class="label">平均每月支出</div>
      <div class="value" id="monthlyTotal">NT$0</div>
      <div class="mini">所有週期換算後</div>
    </div>
    <div class="card stat">
      <div class="label">預估每年支出</div>
      <div class="value" id="annualTotal">NT$0</div>
      <div class="mini">以 12 個月計算</div>
    </div>
    <div class="card stat">
      <div class="label">支出項目</div>
      <div class="value" id="itemCount">0</div>
      <div class="mini">目前已建立的項目</div>
    </div>
    <div class="card stat">
      <div class="label">最大支出分類</div>
      <div class="value" id="largestCategory">—</div>
      <div class="mini" id="largestCategoryMini">尚無資料</div>
    </div>
  </section>

  <main class="grid main-grid">
    <section class="card section">
      <div class="section-title">
        <h2 id="formTitle">新增支出</h2>
      </div>
      <form id="expenseForm">
        <div class="form-grid">
          <div class="field full">
            <label for="name">支出名稱</label>
            <input id="name" maxlength="80" required placeholder="例如：車貸、房租、保險" />
          </div>
          <div class="field">
            <label for="amount">金額</label>
            <input id="amount" type="number" min="0" step="1" required placeholder="0" />
          </div>
          <div class="field">
            <label for="frequency">付款週期</label>
            <select id="frequency">
              <option value="monthly">每月</option>
              <option value="annual">每年</option>
              <option value="quarterly">每季</option>
              <option value="weekly">每週</option>
            </select>
          </div>
          <div class="field full">
            <label for="category">分類</label>
            <div class="inline">
              <select id="category" required></select>
              <button class="btn" type="button" id="addCategoryBtn">＋分類</button>
            </div>
          </div>
          <div class="field full">
            <label for="note">備註（選填）</label>
            <input id="note" maxlength="120" placeholder="例如：每年 6 月扣款" />
          </div>
        </div>
        <div class="form-actions">
          <button class="btn primary" type="submit" id="submitBtn">新增支出</button>
          <button class="btn hidden" type="button" id="cancelEditBtn">取消編輯</button>
        </div>
        <div class="helper">
          輸入原始付款金額及週期，系統會自動換算平均月支出與年支出。
        </div>
      </form>
    </section>

    <section class="card section">
      <div class="section-title">
        <h2>分類占比</h2>
        <select id="chartBasis" aria-label="圖表計算基準" style="width:auto">
          <option value="monthly">依月支出</option>
          <option value="annual">依年支出</option>
        </select>
      </div>
      <div class="chart-wrap">
        <div class="canvas-box">
          <canvas id="donutChart" width="600" height="600"></canvas>
          <div class="chart-center">
            <strong id="chartTotal">NT$0</strong>
            <span id="chartTotalLabel">每月總支出</span>
          </div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
      <div class="footnote">占比依各分類換算後的總支出計算；月支出與年支出的占比相同，金額顯示方式不同。</div>
    </section>
  </main>

  <section class="card table-card">
    <div class="table-head">
      <h2>支出明細</h2>
      <div class="filters">
        <input id="searchInput" placeholder="搜尋支出名稱" />
        <select id="categoryFilter"><option value="">所有分類</option></select>
        <select id="sortSelect">
          <option value="monthly-desc">月支出：高到低</option>
          <option value="monthly-asc">月支出：低到高</option>
          <option value="name-asc">名稱：A 到 Z</option>
          <option value="category-asc">分類：A 到 Z</option>
        </select>
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>支出名稱</th>
            <th>分類</th>
            <th>付款週期</th>
            <th style="text-align:right">原始金額</th>
            <th style="text-align:right">平均每月</th>
            <th style="text-align:right">每年</th>
            <th style="text-align:right">操作</th>
          </tr>
        </thead>
        <tbody id="expenseRows"></tbody>
      </table>
      <div class="empty hidden" id="emptyState">尚未建立任何支出項目。</div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "expense-calculator-v1";
  const colors = [
    "#4b9cff","#44c78a","#ffb454","#b783ff","#ff6f91",
    "#43c6db","#ffd166","#95d36e","#ff8a65","#7b8cff",
    "#e879f9","#9ca3af"
  ];

  const defaultState = {
    categories: ["生活用品","汽車","保險","飲食","電話網路","醫療保健","居家","美容美髮","其他"],
    items: [
      {id:crypto.randomUUID(),name:"生活用品",amount:6000,frequency:"monthly",category:"生活用品",note:"日常用品"},
      {id:crypto.randomUUID(),name:"乙式保險－32,270",amount:2750,frequency:"monthly",category:"汽車",note:"每月預留"},
      {id:crypto.randomUUID(),name:"牌照稅－11,230",amount:1000,frequency:"monthly",category:"汽車",note:"每月預留"},
      {id:crypto.randomUUID(),name:"南山保險－10,875",amount:1000,frequency:"monthly",category:"保險",note:"每月預留"},
      {id:crypto.randomUUID(),name:"吃飯錢",amount:5000,frequency:"monthly",category:"飲食",note:""},
      {id:crypto.randomUUID(),name:"油錢與交通費",amount:5500,frequency:"monthly",category:"汽車",note:""},
      {id:crypto.randomUUID(),name:"iCloud 雲端會員",amount:30,frequency:"monthly",category:"電話網路",note:""},
      {id:crypto.randomUUID(),name:"GPT 會員",amount:1200,frequency:"monthly",category:"電話網路",note:""},
      {id:crypto.randomUUID(),name:"保健食品",amount:1500,frequency:"monthly",category:"醫療保健",note:""},
      {id:crypto.randomUUID(),name:"車貸",amount:37000,frequency:"monthly",category:"汽車",note:""},
      {id:crypto.randomUUID(),name:"生活費、水電、房租",amount:20000,frequency:"monthly",category:"居家",note:""},
      {id:crypto.randomUUID(),name:"YouTube 會員",amount:200,frequency:"monthly",category:"電話網路",note:""},
      {id:crypto.randomUUID(),name:"Google 相簿、雲端硬碟、Gmail",amount:200,frequency:"monthly",category:"電話網路",note:""},
      {id:crypto.randomUUID(),name:"剪頭髮",amount:500,frequency:"monthly",category:"美容美髮",note:""}
    ]
  };

  let state = loadState();
  let editingId = null;

  const $ = id => document.getElementById(id);
  const els = {
    form:$("expenseForm"), name:$("name"), amount:$("amount"), frequency:$("frequency"),
    category:$("category"), note:$("note"), submit:$("submitBtn"), cancel:$("cancelEditBtn"),
    formTitle:$("formTitle"), monthlyTotal:$("monthlyTotal"), annualTotal:$("annualTotal"),
    itemCount:$("itemCount"), largestCategory:$("largestCategory"),
    largestCategoryMini:$("largestCategoryMini"), rows:$("expenseRows"),
    empty:$("emptyState"), chart:$("donutChart"), legend:$("legend"),
    chartBasis:$("chartBasis"), chartTotal:$("chartTotal"), chartTotalLabel:$("chartTotalLabel"),
    search:$("searchInput"), categoryFilter:$("categoryFilter"), sort:$("sortSelect"),
    toast:$("toast"), importFile:$("importFile")
  };

  function cloneDefault(){
    return JSON.parse(JSON.stringify(defaultState));
  }

  function loadState(){
    try{
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if(saved && Array.isArray(saved.categories) && Array.isArray(saved.items)) return saved;
    }catch(e){}
    return cloneDefault();
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function money(value){
    return new Intl.NumberFormat("zh-TW",{
      style:"currency",currency:"TWD",maximumFractionDigits:0
    }).format(Math.round(value || 0));
  }

  function annualOf(item){
    const a = Number(item.amount) || 0;
    if(item.frequency === "annual") return a;
    if(item.frequency === "quarterly") return a * 4;
    if(item.frequency === "weekly") return a * 52;
    return a * 12;
  }

  function monthlyOf(item){ return annualOf(item) / 12; }

  function frequencyText(f){
    return {monthly:"每月",annual:"每年",quarterly:"每季",weekly:"每週"}[f] || f;
  }

  function totalsByCategory(basis="monthly"){
    const map = {};
    state.items.forEach(item => {
      const value = basis === "annual" ? annualOf(item) : monthlyOf(item);
      map[item.category] = (map[item.category] || 0) + value;
    });
    return Object.entries(map)
      .map(([name,value]) => ({name,value}))
      .sort((a,b) => b.value-a.value);
  }

  function renderCategories(){
    const current = els.category.value;
    els.category.innerHTML = state.categories
      .map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
    if(state.categories.includes(current)) els.category.value = current;

    const filterCurrent = els.categoryFilter.value;
    els.categoryFilter.innerHTML = `<option value="">所有分類</option>` +
      state.categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
    if(state.categories.includes(filterCurrent)) els.categoryFilter.value = filterCurrent;
  }

  function renderStats(){
    const monthly = state.items.reduce((s,i)=>s+monthlyOf(i),0);
    const annual = state.items.reduce((s,i)=>s+annualOf(i),0);
    els.monthlyTotal.textContent = money(monthly);
    els.annualTotal.textContent = money(annual);
    els.itemCount.textContent = String(state.items.length);

    const cats = totalsByCategory("monthly");
    if(cats.length){
      const pct = monthly ? cats[0].value / monthly * 100 : 0;
      els.largestCategory.textContent = cats[0].name;
      els.largestCategoryMini.textContent = `${money(cats[0].value)}／月，占 ${pct.toFixed(1)}%`;
    }else{
      els.largestCategory.textContent = "—";
      els.largestCategoryMini.textContent = "尚無資料";
    }
  }

  function getFilteredItems(){
    const q = els.search.value.trim().toLowerCase();
    const cat = els.categoryFilter.value;
    const sort = els.sort.value;
    let items = state.items.filter(i =>
      (!q || i.name.toLowerCase().includes(q) || (i.note||"").toLowerCase().includes(q)) &&
      (!cat || i.category === cat)
    );
    items.sort((a,b)=>{
      if(sort==="monthly-asc") return monthlyOf(a)-monthlyOf(b);
      if(sort==="name-asc") return a.name.localeCompare(b.name,"zh-Hant");
      if(sort==="category-asc") return a.category.localeCompare(b.category,"zh-Hant");
      return monthlyOf(b)-monthlyOf(a);
    });
    return items;
  }

  function renderTable(){
    const items = getFilteredItems();
    els.rows.innerHTML = items.map(item => `
      <tr>
        <td>
          <strong>${escapeHtml(item.name)}</strong>
          ${item.note ? `<div style="color:var(--muted);font-size:12px;margin-top:4px">${escapeHtml(item.note)}</div>` : ""}
        </td>
        <td><span class="badge">${escapeHtml(item.category)}</span></td>
        <td>${frequencyText(item.frequency)}</td>
        <td class="num">${money(item.amount)}</td>
        <td class="num">${money(monthlyOf(item))}</td>
        <td class="num">${money(annualOf(item))}</td>
        <td>
          <div class="actions">
            <button class="icon-btn" data-edit="${item.id}" title="編輯">編輯</button>
            <button class="icon-btn delete" data-delete="${item.id}" title="刪除">刪除</button>
          </div>
        </td>
      </tr>
    `).join("");
    els.empty.classList.toggle("hidden", items.length !== 0);
  }

  function drawChart(){
    const basis = els.chartBasis.value;
    const data = totalsByCategory(basis);
    const total = data.reduce((s,d)=>s+d.value,0);
    const canvas = els.chart;
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const size = Math.max(280, Math.round(rect.width || 320));
    canvas.width = size*dpr;
    canvas.height = size*dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr,dpr);
    const cx=size/2, cy=size/2;
    const radius=size*.40, inner=size*.25;
    ctx.clearRect(0,0,size,size);

    if(!total){
      ctx.beginPath();
      ctx.arc(cx,cy,radius,0,Math.PI*2);
      ctx.arc(cx,cy,inner,0,Math.PI*2,true);
      ctx.fillStyle="#2b3038";
      ctx.fill();
      els.legend.innerHTML = `<div class="empty">新增支出後會顯示分類占比。</div>`;
    }else{
      let start=-Math.PI/2;
      data.forEach((d,idx)=>{
        const angle=d.value/total*Math.PI*2;
        ctx.beginPath();
        ctx.arc(cx,cy,radius,start,start+angle);
        ctx.arc(cx,cy,inner,start+angle,start,true);
        ctx.closePath();
        ctx.fillStyle=colors[idx%colors.length];
        ctx.fill();
        start+=angle;
      });
      els.legend.innerHTML = data.map((d,idx)=>{
        const pct=d.value/total*100;
        return `<div class="legend-row">
          <span class="dot" style="background:${colors[idx%colors.length]}"></span>
          <span class="legend-name">${escapeHtml(d.name)}</span>
          <span class="legend-value"><b>${money(d.value)}</b><small>${pct.toFixed(1)}%</small></span>
        </div>`;
      }).join("");
    }
    els.chartTotal.textContent = money(total);
    els.chartTotalLabel.textContent = basis==="annual" ? "每年總支出" : "每月總支出";
  }

  function renderAll(){
    renderCategories();
    renderStats();
    renderTable();
    requestAnimationFrame(drawChart);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }

  function toast(msg){
    els.toast.textContent = msg;
    els.toast.classList.add("show");
    clearTimeout(toast.timer);
    toast.timer = setTimeout(()=>els.toast.classList.remove("show"),1800);
  }

  function resetForm(){
    editingId=null;
    els.form.reset();
    els.frequency.value="monthly";
    if(state.categories.length) els.category.value=state.categories[0];
    els.formTitle.textContent="新增支出";
    els.submit.textContent="新增支出";
    els.cancel.classList.add("hidden");
  }

  els.form.addEventListener("submit", e=>{
    e.preventDefault();
    const name=els.name.value.trim();
    const amount=Number(els.amount.value);
    const category=els.category.value;
    if(!name || !Number.isFinite(amount) || amount<0 || !category){
      toast("請完整填寫支出資料");
      return;
    }
    const item={
      id:editingId || crypto.randomUUID(),
      name, amount, frequency:els.frequency.value,
      category, note:els.note.value.trim()
    };
    if(editingId){
      const idx=state.items.findIndex(i=>i.id===editingId);
      if(idx>=0) state.items[idx]=item;
      toast("支出已更新");
    }else{
      state.items.push(item);
      toast("支出已新增");
    }
    saveState(); resetForm(); renderAll();
  });

  els.cancel.addEventListener("click", resetForm);

  els.rows.addEventListener("click", e=>{
    const edit=e.target.closest("[data-edit]");
    const del=e.target.closest("[data-delete]");
    if(edit){
      const item=state.items.find(i=>i.id===edit.dataset.edit);
      if(!item) return;
      editingId=item.id;
      els.name.value=item.name;
      els.amount.value=item.amount;
      els.frequency.value=item.frequency;
      els.category.value=item.category;
      els.note.value=item.note||"";
      els.formTitle.textContent="編輯支出";
      els.submit.textContent="儲存修改";
      els.cancel.classList.remove("hidden");
      window.scrollTo({top:0,behavior:"smooth"});
    }
    if(del){
      const item=state.items.find(i=>i.id===del.dataset.delete);
      if(item && confirm(`確定刪除「${item.name}」？`)){
        state.items=state.items.filter(i=>i.id!==item.id);
        saveState(); renderAll(); toast("支出已刪除");
      }
    }
  });

  $("addCategoryBtn").addEventListener("click",()=>{
    const name=prompt("請輸入新分類名稱：");
    if(name===null) return;
    const clean=name.trim();
    if(!clean) return;
    if(state.categories.includes(clean)){
      els.category.value=clean; toast("此分類已存在"); return;
    }
    state.categories.push(clean);
    saveState(); renderCategories();
    els.category.value=clean;
    toast("分類已新增");
  });

  [els.search,els.categoryFilter,els.sort].forEach(el=>{
    el.addEventListener(el.tagName==="INPUT"?"input":"change",renderTable);
  });
  els.chartBasis.addEventListener("change",drawChart);
  window.addEventListener("resize",()=>requestAnimationFrame(drawChart));

  $("exportBtn").addEventListener("click",()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`支出備份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  $("importBtn").addEventListener("click",()=>els.importFile.click());
  els.importFile.addEventListener("change",async()=>{
    const file=els.importFile.files[0];
    if(!file) return;
    try{
      const data=JSON.parse(await file.text());
      if(!Array.isArray(data.categories)||!Array.isArray(data.items)) throw new Error();
      state=data;
      saveState(); resetForm(); renderAll(); toast("備份已匯入");
    }catch(e){
      alert("備份檔格式不正確。");
    }finally{
      els.importFile.value="";
    }
  });

  $("resetBtn").addEventListener("click",()=>{
    if(confirm("確定重設？目前所有資料會被範例資料取代。")){
      state=cloneDefault();
      saveState(); resetForm(); renderAll(); toast("已重設");
    }
  });

  renderAll();
})();
</script>
</body>
</html>
